# Staging overrides — these merge on top of helm/sample-app/values.yaml
replicaCount: 3

image:
  repository: kirankumatkar217/sample-app
  tag: "v1.0.0-0e054ea"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

configmap:
  APP_VERSION: "v1.0.0"
  ENVIRONMENT: "staging"

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

probes:
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 15